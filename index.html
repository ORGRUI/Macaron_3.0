<!-- Macaron · Threads Tab — 全链路可交互原型 v1.0 -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Macaron · Threads 全链路原型</title>
<style>
  :root{
    --cream:#F8F5FC;
    --cream-2:#EDE6F5;
    --pink:#8B5CF6;
    --pink-soft:#DDD6FE;
    --ink:#3A3038;
    --ink-soft:#8B8088;
    --green:#4CAF7D;
    --red:#E8607A;
    --night-1:#2A2545;
    --night-2:#3D3566;
    --card-radius:20px;
    --shadow:0 8px 24px rgba(100,70,140,.12);
    --shadow-lg:0 18px 50px rgba(100,60,140,.22);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);
    background:linear-gradient(135deg,#e8e0f0,#d5c8e8);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;color:var(--ink);
    padding:24px;
  }
  /* ---------- 手机框 ---------- */
  .phone{
    position:relative;width:390px;height:800px;max-height:92vh;
    background:var(--cream);border-radius:44px;
    box-shadow:var(--shadow-lg),0 0 0 12px #1d1a22,0 0 0 14px #36313c;
    overflow:hidden;display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:140px;height:26px;background:#1d1a22;border-radius:0 0 18px 18px;z-index:60;}
  .statusbar{height:46px;flex:0 0 46px;display:flex;align-items:flex-end;
    justify-content:space-between;padding:0 26px 4px;font-size:13px;font-weight:600;color:var(--ink);}
  .stage{flex:1;position:relative;overflow:hidden;}
  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.active{display:flex;}

  /* ---------- 底部 tab ---------- */
  .tabbar{flex:0 0 64px;display:flex;background:rgba(255,255,255,.7);
    backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.04);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;font-size:10px;color:var(--ink-soft);}
  .tab .ic{font-size:19px;}
  .tab.on{color:var(--pink);font-weight:700;}

  /* ---------- 通用 ---------- */
  .btn{border:none;border-radius:14px;padding:13px 18px;font-size:14px;font-weight:700;
    font-family:var(--font);cursor:pointer;transition:transform .12s,filter .12s;}
  .btn:active{transform:scale(.96);}
  .btn-pink{background:var(--pink);color:#fff;box-shadow:0 6px 16px rgba(139,92,246,.35);}
  .btn-ghost{background:rgba(0,0,0,.05);color:var(--ink);}
  h1,h2,h3{margin:0;}
  .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}

  /* ===== Onboarding ===== */
  #onboarding{padding:30px 24px;justify-content:flex-start;}
  .ob-step{display:none;flex-direction:column;height:100%;}
  .ob-step.on{display:flex;}
  .ob-kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);font-weight:700;}
  .ob-title{font-size:27px;font-weight:800;line-height:1.25;margin-top:10px;}
  .ob-sub{color:var(--ink-soft);font-size:14px;line-height:1.6;margin-top:14px;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;}
  .chip{padding:11px 15px;border-radius:30px;background:#fff;border:1.5px solid var(--cream-2);
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s;user-select:none;}
  .chip.sel{background:var(--pink);color:#fff;border-color:var(--pink);transform:translateY(-1px);
    box-shadow:0 6px 14px rgba(139,92,246,.3);}
  .ob-foot{margin-top:auto;padding-top:20px;}
  .ob-count{text-align:center;font-size:12px;color:var(--ink-soft);margin-bottom:12px;}
  .topic-seed{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;}
  .seed{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .seed .ball{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:26px;background:var(--pink-soft);box-shadow:var(--shadow);}
  .seed span{font-size:11px;font-weight:600;}

  /* ===== Swipe Stack ===== */
  #swipe{padding:0;}
  .swipe-top{flex:0 0 auto;padding:10px 24px 4px;display:flex;justify-content:space-between;align-items:center;}
  .swipe-progress{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .dotrow{display:flex;gap:4px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--cream-2);}
  .dot.done{background:var(--pink);}
  .dot.cur{background:var(--pink);transform:scale(1.4);}
  .stack-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;}
  .stack{position:relative;width:300px;height:430px;}
  .swcard{position:absolute;inset:0;border-radius:var(--card-radius);box-shadow:var(--shadow-lg);
    will-change:transform;touch-action:none;perspective:1400px;transition:transform .34s cubic-bezier(.2,.8,.2,1);}
  .flipper{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.1,.2,1);}
  .flipper.flipped{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:var(--card-radius);background:#fff;overflow:hidden;display:flex;flex-direction:column;}
  .face.front{padding:24px;}
  /* 卡片外、状态栏下的 Macaron 推荐理由 */
  .why-global{display:none;margin:12px 22px 10px;background:#fff5e0;border:1px solid #ecd9a8;border-radius:16px;
    padding:12px 14px;gap:11px;align-items:flex-start;animation:whyIn .3s ease-out;
    box-shadow:0 4px 12px rgba(180,140,60,.08);}
  .why-global.on{display:flex;}
  @keyframes whyIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .why-av{flex:0 0 34px;width:34px;height:34px;border-radius:50%;background:var(--pink-soft);
    display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
  .why-av img{width:100%;height:100%;object-fit:cover;}
  .why-txt{font-size:13.5px;line-height:1.55;color:#7d6633;flex:1;font-weight:500;}
  .sw-emoji{font-size:60px;margin:18px 0 8px;}
  .sw-title{font-size:22px;font-weight:800;line-height:1.3;}
  .sw-body{font-size:14px;color:var(--ink-soft);line-height:1.65;margin-top:12px;}
  .face.back{transform:rotateY(180deg);}
  .flip-hint{margin-top:8px;font-size:11px;color:var(--ink-soft);text-align:center;}
  /* 背面 */
  .bk-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px;}
  .bk-tag{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--pink);}
  .bk-close{border:none;background:rgba(0,0,0,.05);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;
    cursor:pointer;color:var(--ink);font-family:var(--font);}
  .bk-title{padding:0 18px 4px;font-size:18px;font-weight:800;flex:0 0 auto;}
  .bk-body{flex:1;overflow-y:auto;padding:6px 16px 12px;}
  .bk-body::-webkit-scrollbar{display:none;}
  .bk-foot{flex:0 0 auto;display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(0,0,0,.05);}
  .bk-foot button{flex:1;border:none;border-radius:12px;padding:11px 4px;font-weight:800;font-size:12px;cursor:pointer;
    font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;}
  .bk-foot .del{background:rgba(232,96,122,.12);color:var(--red);}
  .bk-foot .save{background:rgba(76,175,125,.14);color:var(--green);}
  .bk-foot .up{background:var(--pink);color:#fff;}
  .sw-type{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;}
  .sw-tag{margin-top:auto;font-size:12px;font-weight:700;color:var(--pink);background:var(--pink-soft);
    align-self:flex-start;padding:6px 12px;border-radius:20px;}
  /* 方向反馈角标 */
  /* === 拖动时的整卡蒙层 === */
  .drag-overlay{position:absolute;inset:0;border-radius:var(--card-radius);
    pointer-events:none;z-index:5;background:transparent;transition:background .12s;}
  .drag-overlay.save{background:rgba(60,55,65,.45);}
  .drag-overlay.do{background:rgba(76,156,98,.42);}
  .overlay-tag{position:absolute;top:22px;right:22px;color:#fff;font-weight:900;font-size:15px;
    letter-spacing:.06em;border:3px solid rgba(255,255,255,.95);padding:7px 13px;border-radius:12px;
    transform:rotate(-10deg);opacity:0;backdrop-filter:blur(2px);
    text-shadow:0 1px 4px rgba(0,0,0,.25);}
  .drag-overlay.save .tag-save{opacity:1;}
  .drag-overlay.do .tag-do{opacity:1;}

  /* === 操作栏 === */
  .action-bar{flex:0 0 auto;display:flex;gap:10px;align-items:center;padding:6px 18px 14px;}
  .action-bar button{border:none;font-family:var(--font);cursor:pointer;font-weight:900;letter-spacing:.05em;
    transition:transform .12s,background .2s,color .2s,box-shadow .2s;}
  .action-bar button:active{transform:scale(.96);}
  .act-save{flex:1;height:48px;border-radius:24px;background:#ECE6DC;color:#7a7468;font-size:13px;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .act-save .ab-ic{font-size:15px;}
  .act-trash{width:48px;height:48px;border-radius:50%;background:#2c2b27;color:#fff;font-size:18px;
    flex:0 0 48px;display:flex;align-items:center;justify-content:center;}
  .act-do{flex:1.4;height:48px;border-radius:24px;background:#E2EBD8;color:#4d6a32;font-size:13px;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .act-do .ab-ic{font-size:14px;font-weight:900;}
  /* 拖动时呼应高亮 */
  .action-bar button.lit{transform:translateY(-2px);}
  .act-save.lit{background:#525262;color:#fff;box-shadow:0 8px 18px rgba(80,82,98,.35);}
  .act-do.lit{background:#50AA6E;color:#fff;box-shadow:0 8px 18px rgba(80,170,110,.4);}

  /* 首次引导浮层 */
  .guide{position:absolute;inset:0;background:rgba(40,30,40,.72);z-index:40;
    display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:6px;}
  .guide.on{display:flex;}
  .guide .arrows{position:relative;width:200px;height:200px;margin:14px 0;}
  .guide .ar{position:absolute;font-size:30px;animation:nudge 1.2s ease-in-out infinite;}
  .ar.up{top:0;left:50%;transform:translateX(-50%);} 
  .ar.left{left:0;top:50%;transform:translateY(-50%);}
  .ar.right{right:0;top:50%;transform:translateY(-50%);}
  .ar.lbl{font-size:11px;font-weight:700;animation:none;}
  @keyframes nudge{0%,100%{opacity:.5}50%{opacity:1}}
  .guide .core{font-size:13px;background:rgba(255,255,255,.15);padding:8px 14px;border-radius:30px;}

  /* 轻提示气泡 */
  .nudge-toast{position:absolute;left:50%;transform:translateX(-50%);bottom:80px;z-index:30;
    background:var(--ink);color:#fff;padding:12px 16px;border-radius:14px;font-size:12.5px;line-height:1.5;
    width:280px;display:none;box-shadow:var(--shadow-lg);}
  .nudge-toast.on{display:block;animation:pop .25s;}
  .nudge-toast .acts{display:flex;gap:8px;margin-top:10px;}
  .nudge-toast .acts button{flex:1;font-size:12px;padding:8px;border-radius:9px;border:none;font-weight:700;}
  @keyframes pop{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

  /* save toast (换分类) */
  .save-toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:35;
    background:#fff;color:var(--ink);padding:11px 16px;border-radius:30px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow-lg);display:none;align-items:center;gap:10px;}
  .save-toast.on{display:flex;animation:pop .25s;}
  .save-toast b{color:var(--green);}
  .save-toast button{background:none;border:none;color:var(--pink);font-weight:800;font-size:13px;cursor:pointer;}

  /* ===== 成就时刻 ===== */
  #achieve{position:absolute;inset:0;z-index:50;background:rgba(35,28,38,0);
    display:none;align-items:center;justify-content:center;flex-direction:column;transition:background .5s;}
  #achieve.on{display:flex;}
  .ach-txt{color:#fff;font-size:22px;font-weight:800;opacity:0;transition:opacity .6s;}
  .cookie{margin-top:8px;transform:translateY(120px);opacity:0;transition:transform .9s cubic-bezier(.2,.8,.2,1),opacity .9s;}
  .petal{position:absolute;font-size:18px;opacity:0;}

  /* ===== 主页面 ===== */
  #home{padding:0;}
  .home-scroll{flex:1;overflow-y:auto;padding:6px 20px 24px;}
  .home-scroll::-webkit-scrollbar{display:none;}
  .greet{padding:10px 2px 4px;}
  .greet h2{font-size:24px;font-weight:800;}
  .greet p{color:var(--ink-soft);font-size:13px;margin-top:4px;}

  /* ===== Splash 开屏 ===== */
  #swipe{padding:0;}
  .splash-hero{padding:18px 22px 8px;flex:0 0 auto;}
  .splash-tag-row{display:flex;align-items:center;gap:10px;}
  .sp-hero-tag{font-size:12px;font-weight:800;letter-spacing:.02em;color:var(--pink);
    background:rgba(139,92,246,.12);padding:4px 10px;border-radius:12px;}
  .sp-hero-cnt{font-size:10.5px;color:var(--ink-soft);font-weight:600;letter-spacing:.02em;}
  .splash-title{font-size:22px;font-weight:800;line-height:1.3;margin-top:10px;}
  .splash-sub{font-size:13px;color:var(--ink-soft);margin-top:8px;line-height:1.6;}
  .splash-deck{flex:0 0 auto;overflow-x:auto;overflow-y:hidden;padding:14px 22px 16px;
    display:flex;gap:12px;scroll-snap-type:x mandatory;align-items:flex-start;}
  .splash-deck::-webkit-scrollbar{display:none;}
  .sp-card{flex:0 0 auto;width:165px;height:280px;background:#fff;border-radius:18px;padding:18px 15px;cursor:pointer;
    position:relative;box-shadow:var(--shadow);scroll-snap-align:start;
    display:flex;flex-direction:column;gap:8px;transition:transform .18s;
    border:1px solid rgba(0,0,0,.04);}
  .sp-card:active{transform:scale(.97);}
  .sp-card .sp-tag{font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--pink);}
  .sp-card .sp-emo{font-size:46px;margin:8px 0 4px;line-height:1;}
  .sp-card .sp-title{font-size:15px;font-weight:800;line-height:1.35;}
  .sp-card .sp-body{font-size:12px;color:var(--ink-soft);line-height:1.55;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
  .sp-foot-hint{font-size:10px;color:var(--ink-soft);margin-top:auto;padding-top:6px;border-top:1px solid rgba(0,0,0,.04);}
  /* 单卡 ✓加入 / 跳过 切换 */
  .sp-toggle{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;
    border:none;cursor:pointer;font-size:13px;font-weight:900;font-family:var(--font);
    display:flex;align-items:center;justify-content:center;transition:.18s;z-index:2;
    background:var(--green);color:#fff;box-shadow:0 3px 8px rgba(76,175,125,.35);}
  .sp-card.skipped .sp-toggle{background:#d8d2c8;color:#8a8478;box-shadow:none;}
  .sp-card.skipped{opacity:.45;filter:grayscale(.5);}
  .sp-card.skipped .sp-foot-hint::after{content:' · 已跳过';color:#b0625e;font-weight:700;}
  .splash-tip{flex:1;min-height:0;padding:8px 26px 0;display:flex;align-items:flex-start;gap:11px;
    color:var(--ink-soft);font-size:12px;line-height:1.6;}
  .splash-tip .st-av{flex:0 0 28px;width:28px;height:28px;border-radius:50%;overflow:hidden;background:var(--pink-soft);}
  .splash-tip .st-av img{width:100%;height:100%;object-fit:cover;}
  .splash-foot{flex:0 0 auto;display:flex;gap:10px;padding:12px 22px 20px;}
  .sp-skip{flex:1;background:none;border:1px solid var(--cream-2);color:var(--ink-soft);
    border-radius:14px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);}
  .sp-go{flex:2;background:var(--pink);color:#fff;border:none;
    border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);
    box-shadow:0 6px 18px rgba(139,92,246,.35);}
  .sp-go:active,.sp-skip:active{transform:scale(.97);}

  /* ===== 推送回顾入口 ===== */
  .archive-bar{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--cream-2);
    border-radius:14px;padding:11px 14px;margin:8px 0 16px;cursor:pointer;}
  .archive-bar:active{transform:scale(.99);}
  .ab-ic{font-size:22px;}
  .ab-txt{flex:1;}
  .ab-txt b{font-size:13.5px;font-weight:800;display:block;}
  .ab-txt span{font-size:11px;color:var(--ink-soft);display:block;margin-top:2px;}
  .ab-go{color:var(--pink);font-size:18px;font-weight:700;}

  /* ===== 回顾浮层 ===== */
  #archiveVeil{position:absolute;inset:0;z-index:65;background:rgba(20,16,30,.5);display:none;align-items:flex-end;}
  #archiveVeil.on{display:flex;}
  .archive-sheet{width:100%;max-height:88%;background:var(--cream);border-radius:26px 26px 0 0;padding:18px 20px 22px;
    transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);overflow-y:auto;}
  #archiveVeil.on .archive-sheet{transform:translateY(0);}
  .archive-sheet::-webkit-scrollbar{display:none;}
  .av-head{display:flex;align-items:center;justify-content:space-between;margin:6px 0 18px;}
  .av-head h3{font-size:19px;font-weight:800;}
  .av-head button{border:none;background:none;font-size:13px;color:var(--ink-soft);cursor:pointer;font-weight:600;}
  .ar-item{background:#fff;border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow);}
  .ar-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .ar-head .ar-tag{font-size:11px;font-weight:800;color:var(--pink);padding:3px 9px;background:rgba(139,92,246,.12);border-radius:10px;}
  .ar-head .ar-time{font-size:10.5px;color:var(--ink-soft);margin-left:auto;}
  .ar-head .ar-status{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:10px;}
  .ar-head .ar-status.skipped{background:rgba(120,120,130,.12);color:#666;}
  .ar-head .ar-status.accepted{background:rgba(76,156,98,.16);color:#3d7a4e;}
  .ar-title{font-size:15px;font-weight:800;margin-bottom:5px;}
  .ar-intro{font-size:12px;color:var(--ink-soft);line-height:1.55;}
  .ar-cards{display:flex;gap:8px;margin:10px 0 12px;overflow-x:auto;}
  .ar-cards::-webkit-scrollbar{display:none;}
  .ar-mini{flex:0 0 auto;width:80px;background:var(--cream);border-radius:10px;padding:10px 8px;text-align:center;
    border:1px solid rgba(0,0,0,.05);}
  .ar-mini .ar-e{font-size:22px;}
  .ar-mini .ar-t{font-size:10.5px;font-weight:700;margin-top:4px;line-height:1.25;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .ar-actions{display:flex;gap:8px;}
  .ar-actions button{flex:1;border:none;border-radius:11px;padding:9px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--font);}
  .ar-recall{background:var(--pink);color:#fff;}
  .ar-discard{background:rgba(0,0,0,.06);color:var(--ink-soft);}
  .ar-empty{padding:40px 0;text-align:center;color:var(--ink-soft);font-size:12.5px;line-height:1.6;}

  /* ===== 横排圆形金刚位 ===== */
  .topics-row{display:flex;gap:14px;overflow-x:auto;padding:6px 0 12px;scroll-snap-type:x proximity;}
  .topics-row::-webkit-scrollbar{display:none;}
  .top-circle{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;scroll-snap-align:start;}
  .top-circle .tc-ball{position:relative;width:56px;height:56px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:var(--shadow);
    transition:transform .15s;}
  .top-circle:active .tc-ball{transform:scale(.92);}
  .top-circle .tc-ball.flash{animation:topicFlash 1.6s ease-out;}
  @keyframes topicFlash{
    0%,100%{box-shadow:var(--shadow);}
    50%{box-shadow:0 0 0 5px rgba(139,92,246,.4),0 0 18px rgba(139,92,246,.3);transform:scale(1.06);}
  }
  .top-circle .tc-name{font-size:11px;font-weight:600;color:var(--ink);max-width:64px;
    text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .top-circle.flash .tc-ball{animation:tcFlash 1.6s ease-out;}
  @keyframes tcFlash{
    0%{box-shadow:0 0 0 0 rgba(139,92,246,0);}
    30%{box-shadow:0 0 0 6px rgba(139,92,246,.45),0 0 22px rgba(139,92,246,.4);transform:scale(1.12);}
    100%{box-shadow:0 0 0 0 rgba(139,92,246,0);}
  }
  /* 新用户：占位圆 */
  .top-circle.empty .tc-ball.placeholder{background:rgba(0,0,0,.04);
    border:2px dashed rgba(139,92,246,.35);color:rgba(139,92,246,.55);
    font-size:24px;font-weight:300;line-height:1;display:flex;align-items:center;justify-content:center;}
  .top-circle.empty .tc-name{color:var(--ink-soft);font-style:italic;}
  /* 新用户：主页空状态 hero */
  .newuser-hero{margin-top:28px;padding:34px 22px 30px;text-align:center;
    background:linear-gradient(180deg,#fff6ee 0%,rgba(255,246,238,0) 100%);
    border-radius:20px;}
  .newuser-hero .nu-emo{font-size:48px;line-height:1;margin-bottom:14px;}
  .newuser-hero h3{font-size:18px;font-weight:800;margin-bottom:8px;}
  .newuser-hero p{font-size:13px;color:var(--ink-soft);line-height:1.65;max-width:280px;margin:0 auto;}
  .newuser-hero .nu-hint{font-size:11.5px;color:var(--ink-soft);margin-top:18px;
    padding:9px 14px;background:rgba(0,0,0,.025);border-radius:11px;display:inline-block;}
  /* mini-card 来源角标 */
  .mini-card .mc-src{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;
    padding:2px 6px;border-radius:7px;background:rgba(160,107,63,.13);color:#a06b3f;letter-spacing:.02em;}
  .top-circle .tc-dot{position:absolute;top:-2px;right:-2px;background:var(--pink);color:#fff;
    font-size:9px;font-weight:800;min-width:17px;height:17px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;}

  /* ===== Topic 分组的小卡列表 ===== */
  .group-sec{margin-top:18px;}
  .group-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 2px 8px;}
  .group-head h4{font-size:14px;font-weight:800;letter-spacing:.01em;}
  .group-head h4 small{font-size:11px;color:var(--ink-soft);font-weight:600;margin-left:6px;}
  .group-head .more{font-size:12px;color:var(--pink);cursor:pointer;font-weight:600;}
  .group-row{display:flex;gap:10px;overflow-x:auto;padding:2px 0 6px;scroll-snap-type:x proximity;}
  .group-row::-webkit-scrollbar{display:none;}
  .mini-card{flex:0 0 auto;width:138px;background:#fff;border-radius:16px;padding:13px;cursor:pointer;
    box-shadow:var(--shadow);scroll-snap-align:start;
    display:flex;flex-direction:column;gap:6px;transition:transform .15s;}
  .mini-card:active{transform:scale(.96);}
  .mini-card .mc-tag{font-size:9.5px;font-weight:800;letter-spacing:.05em;color:var(--pink);}
  .mini-card .mc-emo{font-size:28px;margin:2px 0;}
  .mini-card .mc-title{font-size:13px;font-weight:800;line-height:1.3;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .mini-card .mc-body{font-size:11px;color:var(--ink-soft);line-height:1.45;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-top:auto;}
  .mini-card{position:relative;}
  /* ===== Mini Widget 预览（紧凑版，不溢出） ===== */
  .mc-widget{margin:5px 0 7px;min-height:30px;display:flex;align-items:center;overflow:hidden;}
  .mw-pill{font-size:10.5px;padding:5px 9px;border-radius:9px;background:rgba(139,92,246,.1);color:var(--pink);
    font-weight:700;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  /* 双 chip */
  .mw-twin{display:flex;gap:4px;flex-wrap:wrap;}
  .mw-chip{font-size:10px;padding:3px 7px;border-radius:8px;background:rgba(139,92,246,.1);color:var(--pink);
    font-weight:700;letter-spacing:.01em;white-space:nowrap;}
  /* 水滴 */
  .mw-water{display:flex;align-items:center;gap:2px;}
  .mw-drop{width:7px;height:9px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:#dbe6ea;}
  .mw-drop.on{background:#5eb3e0;}
  .mw-num{font-size:10.5px;font-weight:800;margin-left:6px;color:#5eb3e0;}
  /* 心情 picker */
  .mw-mood{display:flex;gap:3px;}
  .mw-mood span{font-size:17px;filter:grayscale(1);opacity:.4;transition:all .2s;}
  .mw-mood span.on{filter:none;opacity:1;transform:scale(1.18);}
  /* 呼吸环 / 进度环 */
  .mw-ring{display:flex;align-items:center;gap:7px;}
  .mw-ring-tx{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:#7a64a0;}
  /* 音乐：唱片 + 音波 */
  .mw-music{display:flex;align-items:center;gap:7px;}
  .mw-music .mw-disc{font-size:20px;}
  .mw-bars{display:flex;gap:2px;align-items:flex-end;height:16px;}
  .mw-bars i{width:3px;background:var(--pink);border-radius:2px;animation:mwbar 1.2s ease-in-out infinite;}
  .mw-bars i:nth-child(1){height:50%;animation-delay:0s;}
  .mw-bars i:nth-child(2){height:80%;animation-delay:.15s;}
  .mw-bars i:nth-child(3){height:60%;animation-delay:.3s;}
  .mw-bars i:nth-child(4){height:90%;animation-delay:.45s;}
  @keyframes mwbar{0%,100%{transform:scaleY(.5);}50%{transform:scaleY(1);}}
  /* 钱 */
  .mw-money{display:flex;align-items:baseline;gap:6px;}
  .mw-money b{font-size:16px;font-weight:800;color:#a17b4d;letter-spacing:-.01em;}
  .mw-money .mw-trend{font-size:10px;font-weight:800;padding:2px 6px;border-radius:7px;
    background:rgba(76,156,98,.15);color:#3d7a4e;}
  /* 衣物 */
  .mw-style{display:flex;gap:5px;font-size:20px;line-height:1;align-items:center;}
  /* 进度条 */
  .mw-prog{display:flex;align-items:center;gap:7px;width:100%;}
  .mw-prog-bar{flex:1;height:6px;background:#e8d9c0;border-radius:3px;overflow:hidden;}
  .mw-prog-bar i{display:block;height:100%;background:#a17b4d;border-radius:3px;}
  .mw-prog-tx{font-size:9.5px;font-weight:700;color:#a17b4d;white-space:nowrap;}
  .empty-state{padding:30px 16px;text-align:center;color:var(--ink-soft);font-size:12px;line-height:1.6;}
  /* Macaron 主聊天入口（午安下方胶囊） */
  .macaron-entry{display:flex;align-items:center;gap:12px;margin:14px 0 18px;cursor:pointer;
    background:linear-gradient(135deg,#fff5e8,#fde2d2);
    border:1px solid rgba(139,92,246,.22);
    border-radius:26px;padding:9px 18px 9px 8px;
    box-shadow:0 6px 16px rgba(139,92,246,.08);
    transition:transform .15s;}
  .macaron-entry:active{transform:scale(.98);}
  .me-av{flex:0 0 40px;width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--pink-soft);}
  .me-av img{width:100%;height:100%;object-fit:cover;display:block;}
  .me-txt{flex:1;min-width:0;}
  .me-title{font-size:14px;font-weight:800;color:var(--pink);}
  .me-sub{font-size:11.5px;color:#a87a4a;margin-top:1px;}
  .sec-label{font-size:12px;font-weight:800;letter-spacing:.08em;color:var(--ink-soft);
    text-transform:uppercase;margin:22px 2px 12px;display:flex;justify-content:space-between;align-items:center;}
  .sec-label .more{color:var(--pink);cursor:pointer;}
  .focus-list{display:flex;flex-direction:column;gap:10px;}
  .todo{background:#fff;border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:13px;cursor:pointer;
    transition:opacity .25s,transform .25s;}
  .todo .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--pink-soft);flex:0 0 26px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;background:none;cursor:pointer;}
  .todo .check.on{background:var(--pink);border-color:var(--pink);}
  .todo.done{opacity:.5;}
  .todo.done .ttl{text-decoration:line-through;color:var(--ink-soft);}
  .todo .te{font-size:22px;flex:0 0 28px;text-align:center;}
  .todo .tinfo{flex:1;min-width:0;}
  .todo .ttl{font-size:14.5px;font-weight:700;line-height:1.3;}
  .todo .tsub{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .todo .tag{font-size:10px;font-weight:800;color:var(--pink);background:var(--pink-soft);padding:3px 8px;border-radius:10px;flex:0 0 auto;}
  .focus-track{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 6px;}
  .focus-track::-webkit-scrollbar{display:none;}
  .fcard{flex:0 0 175px;background:#fff;border-radius:var(--card-radius);padding:16px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;min-height:150px;}
  .fcard .fe{font-size:30px;}
  .fcard .ft{font-weight:800;font-size:15px;margin-top:8px;line-height:1.3;}
  .fcard .fb{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;flex:1;}
  .fcard .done{margin-top:10px;align-self:flex-start;background:var(--pink);color:#fff;border:none;
    border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;}
  .focus-empty{font-size:13px;color:var(--ink-soft);background:rgba(255,255,255,.6);border-radius:16px;
    padding:18px;text-align:center;}
  /* ===== Candy-jar 风格 Topic ===== */
  .candy-jar{position:relative;height:280px;padding:6px 0 10px;margin:0 -4px;}
  .candy{position:absolute;cursor:pointer;transition:transform .25s cubic-bezier(.2,.8,.2,1);}
  .candy:active{transform:scale(.93) !important;}
  .candy svg{width:100%;height:100%;display:block;filter:drop-shadow(0 6px 14px rgba(100,70,140,.16));}
  .candy-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;text-align:center;padding:0 14%;}
  .candy-text b{font-size:16px;font-weight:800;color:#2e2630;line-height:1;letter-spacing:-0.01em;
    font-family:'Avenir Next','PingFang SC',-apple-system,'Helvetica Neue',sans-serif;}
  .candy-text span{font-size:11px;color:rgba(46,38,48,.72);margin-top:5px;font-weight:600;letter-spacing:.01em;}
  /* 闪光态 */
  .candy.flash svg{animation:candyFlash 1.6s ease-out;}
  @keyframes candyFlash{
    0%{filter:drop-shadow(0 6px 14px rgba(100,70,140,.16)) drop-shadow(0 0 0 rgba(139,92,246,.8));transform:scale(1);}
    30%{filter:drop-shadow(0 10px 26px rgba(139,92,246,.55)) drop-shadow(0 0 20px rgba(139,92,246,.6));transform:scale(1.08);}
    100%{filter:drop-shadow(0 6px 14px rgba(100,70,140,.16));transform:scale(1);}
  }
  /* NEW 红字标签 */
  .candy-new{position:absolute;top:4%;right:4%;background:var(--pink);color:#fff;font-size:9px;font-weight:800;
    padding:2px 7px;border-radius:9px;letter-spacing:.04em;box-shadow:0 3px 8px rgba(139,92,246,.4);z-index:2;
    font-family:var(--font);}

  /* ===== Daily Summary ===== */
  #summary-veil{position:absolute;inset:0;z-index:55;background:rgba(20,16,30,.55);
    display:none;align-items:flex-end;}
  #summary-veil.on{display:flex;}
  .summary-sheet{width:100%;max-height:78%;background:linear-gradient(180deg,var(--night-1),#241f3c);
    border-radius:26px 26px 0 0;padding:22px 22px 26px;color:#fff;overflow-y:auto;transform:translateY(100%);
    transition:transform .35s cubic-bezier(.2,.8,.2,1);}
  #summary-veil.on .summary-sheet{transform:translateY(0);}
  .summary-sheet::-webkit-scrollbar{display:none;}
  .sheet-grip{width:42px;height:5px;background:rgba(255,255,255,.35);border-radius:4px;margin:0 auto 18px;}
  .summary-sheet h2{font-size:21px;font-weight:800;}
  .summary-sheet .sub{color:rgba(255,255,255,.7);font-size:13px;margin-top:8px;}
  .sum-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:16px;
    padding:14px;margin-top:14px;}
  .sum-card .row1{display:flex;align-items:center;gap:10px;}
  .sum-card .row1 .e{font-size:24px;}
  .sum-card .row1 b{font-size:15px;}
  .sum-card .defer{font-size:11px;color:var(--pink-soft);margin-left:auto;}
  .sum-acts{display:flex;gap:8px;margin-top:12px;}
  .sum-acts button{flex:1;border:none;border-radius:11px;padding:10px 4px;font-size:12px;font-weight:700;cursor:pointer;
    background:rgba(255,255,255,.14);color:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .sum-acts button .si{font-size:16px;}
  .sum-acts button.done{background:var(--green);}
  .batch{display:flex;gap:10px;margin-top:20px;}
  .batch button{flex:1;border-radius:13px;padding:13px;border:none;font-weight:700;font-size:13px;cursor:pointer;}
  .batch .b1{background:rgba(255,255,255,.16);color:#fff;}
  .batch .b2{background:var(--pink);color:#fff;}
  .sum-done{text-align:center;padding:30px 10px;}
  .sum-done .e{font-size:50px;}
  .sum-done p{margin-top:14px;font-size:15px;font-weight:700;}
  /* —— 新版总结报告 —— */
  .sum-head{text-align:center;padding:6px 0 4px;}
  .sum-emo{font-size:44px;}
  .sum-stats{display:flex;gap:10px;margin:14px 0 8px;}
  .stt{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 8px;text-align:center;}
  .stt b{font-size:23px;font-weight:800;display:block;}
  .stt span{font-size:11px;color:rgba(255,255,255,.65);}
  .sum-line{font-size:12.5px;color:rgba(255,255,255,.7);margin:4px 0 10px;}
  .sum-line b{color:#fff;}
  .sum-section{font-size:12px;font-weight:700;color:rgba(255,255,255,.55);margin:14px 0 8px;letter-spacing:.05em;}
  .sum-done-list{margin-top:6px;display:flex;flex-direction:column;gap:7px;}
  .sum-mini{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:12px;padding:9px 12px;font-size:13px;}
  .sum-mini.done b{text-decoration:line-through;opacity:.7;}
  .sum-mini .e{font-size:17px;}
  .sum-mini .ck{margin-left:auto;color:#9fe3b0;font-weight:800;}
  .sum-close{margin-top:18px;width:100%;border:none;border-radius:14px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;
    background:rgba(255,255,255,.16);color:#fff;font-family:var(--font);}
  .sum-close.primary{background:#9fe3b0;color:#1a3a22;}

  /* ===== Topic 内页 ===== */
  #topic{padding:0;}
  .topic-head{padding:18px 22px 12px;}
  .topic-head .back{font-size:14px;color:var(--pink);font-weight:700;cursor:pointer;}
  .topic-head h2{font-size:24px;font-weight:800;margin-top:14px;}
  .topic-head .meta{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .topic-head .persona{font-size:12.5px;color:var(--ink);background:rgba(255,255,255,.7);border-radius:14px;
    padding:11px 14px;margin-top:14px;line-height:1.55;}
  .topic-list{flex:1;overflow-y:auto;padding:6px 22px 22px;display:flex;flex-direction:column;gap:11px;}
  .topic-list::-webkit-scrollbar{display:none;}
  .tcard{background:#fff;border-radius:16px;padding:15px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:center;}
  .tcard .te{font-size:26px;}
  .tcard .tt{font-weight:700;font-size:14px;}
  .tcard .tb{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .tcard .check{margin-left:auto;font-size:18px;color:var(--green);}
  .topic-note{font-size:11px;color:var(--ink-soft);text-align:center;padding:6px 20px 0;font-style:italic;}
  .topic-add{margin:4px 22px 0;border:1.5px dashed var(--pink);color:var(--pink);background:none;border-radius:14px;
    padding:13px;font-size:13px;font-weight:700;cursor:pointer;}

  /* ===== 外部演示遥控器（在手机框之外） ===== */
  .swipe-remote{position:fixed;left:28px;top:50%;transform:translateY(-50%);z-index:150;
    display:none;flex-direction:column;align-items:center;gap:9px;
    background:rgba(255,255,255,.78);backdrop-filter:blur(10px);padding:16px;border-radius:22px;box-shadow:var(--shadow-lg);}
  .swipe-remote .rm-cap{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase;}
  .rm-row{display:flex;gap:9px;}
  .rm{border:none;border-radius:16px;width:78px;height:64px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;cursor:pointer;font-family:var(--font);font-weight:800;font-size:12px;
    transition:transform .12s;color:var(--ink);background:#fff;box-shadow:var(--shadow);}
  .rm span{font-size:20px;}
  .rm:active{transform:scale(.92);}
  .rm.trash{background:#2c2b27;color:#fff;}
  .rm.left{background:#fff;color:#525262;}
  .rm.right{background:#fff;color:#50AA6E;}
  .rm.mid{background:var(--cream-2);color:var(--ink-soft);}
  .rm-hint{font-size:10px;color:var(--ink-soft);margin-top:2px;}
  @media(max-width:860px){ .swipe-remote{left:8px;padding:10px;gap:6px;} .rm{width:58px;height:52px;font-size:10px;} .rm span{font-size:17px;} }

  /* ===== 卡片详情面板 ===== */
  #detail-veil{position:absolute;inset:0;z-index:58;background:rgba(20,16,30,.45);display:none;align-items:flex-end;}
  #detail-veil.on{display:flex;}
  .detail-sheet{width:100%;height:90%;background:var(--cream);border-radius:26px 26px 0 0;
    transform:translateY(100%);transition:transform .38s cubic-bezier(.2,.8,.2,1);overflow:hidden;
    display:flex;flex-direction:column;position:relative;}
  #detail-veil.on .detail-sheet{transform:translateY(0);}
  .dh-grip{width:42px;height:5px;background:rgba(0,0,0,.18);border-radius:4px;margin:10px auto 0;flex:0 0 auto;z-index:2;}
  .detail-sheet:has(.d-stage.bk-dark) .dh-grip,
  .detail-sheet:has(.d-stage.bk-music) .dh-grip{background:rgba(255,255,255,.3);}
  .dh-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(0,0,0,.06);font-size:14px;cursor:pointer;z-index:3;}
  .d-stage.bk-dark ~ .dh-close,
  .detail-sheet:has(.d-stage.bk-dark) .dh-close,
  .detail-sheet:has(.d-stage.bk-music) .dh-close{background:rgba(255,255,255,.18);color:#fff;}
  .d-stage{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;position:relative;}
  .d-stage > .bk2{flex:1;min-height:0;}
  .d-stage > .bk2 .bk2-head{padding-top:8px;}
  .d-stage > .bk2 .bd-bar{display:none;}
  .d-stage > .bk2 .bk2-foot{border-top:1px solid rgba(0,0,0,.06);}
  .dfoot{flex:0 0 auto;display:flex;gap:8px;padding:10px 14px 14px;background:rgba(255,255,255,.55);border-top:1px solid rgba(0,0,0,.05);}
  .df-btn{flex:1;border:none;border-radius:14px;padding:13px 4px;font-weight:800;font-size:13px;cursor:pointer;font-family:var(--font);}
  .df-btn:active{transform:scale(.96);}
  .df-btn.save{background:#ECE6DC;color:#525262;}
  .df-btn.trash{flex:0 0 52px;background:#2c2b27;color:#fff;font-size:16px;}
  .df-btn.do{background:#E2EBD8;color:#4d6a32;}
  /* 修改卡片 bar */
  .d-edit-bar{flex:0 0 auto;padding:10px 16px 14px;background:rgba(255,255,255,.5);border-top:1px solid rgba(0,0,0,.05);
    display:flex;justify-content:center;}
  .d-edit-btn{background:#fff;border:1px solid rgba(139,92,246,.3);color:var(--pink);
    font-size:13px;font-weight:700;padding:10px 22px;border-radius:14px;cursor:pointer;font-family:var(--font);
    box-shadow:0 2px 6px rgba(100,70,140,.08);}
  .d-edit-btn:active{transform:scale(.96);background:rgba(139,92,246,.05);}
  .df-btn.done{background:var(--pink);color:#fff;}
  /* 兼容老的 .dh / .dbody（如还有其它处调用） */
  .dh{padding:18px 22px 14px;position:relative;flex:0 0 auto;}
  .dh .grip{width:42px;height:5px;background:rgba(0,0,0,.12);border-radius:4px;margin:0 auto 14px;}
  .dh .close{position:absolute;top:14px;right:18px;width:34px;height:34px;border-radius:50%;border:none;
    background:rgba(0,0,0,.06);font-size:15px;cursor:pointer;}
  .dh .dtag{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--pink);}
  .dh .de{font-size:44px;margin:4px 0;}
  .dh .dt{font-size:23px;font-weight:800;line-height:1.25;}
  .dbody{flex:1;overflow-y:auto;padding:4px 22px 18px;}
  .dbody::-webkit-scrollbar{display:none;}
  /* 详情内容块 */

  /* —— Money 账本背面 —— */

  .mn-ring{position:relative;width:108px;height:108px;flex:0 0 108px;}
  .mn-ring svg{width:108px;height:108px;transform:rotate(0deg);}
  .mn-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}

  /* ===== Topic 空间（仪表盘） ===== */
  .topic-scroll{flex:1;overflow-y:auto;padding:8px 18px 24px;}
  .topic-scroll::-webkit-scrollbar{display:none;}
  .ts-head{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;}
  .ts-back{width:38px;height:38px;border-radius:50%;border:none;background:#fff;box-shadow:var(--shadow);font-size:16px;cursor:pointer;}
  .ts-name{font-size:22px;font-weight:800;}

  .ts-stat{background:#fff;border-radius:20px;padding:15px;box-shadow:var(--shadow);min-height:120px;display:flex;flex-direction:column;}
  .ts-row{display:flex;align-items:center;justify-content:space-between;}
  .ts-ico{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;}
  .ts-pill{font-size:11px;font-weight:800;padding:3px 8px;border-radius:12px;}
  .ts-big{font-size:23px;font-weight:800;margin-top:11px;}
  .ts-big small{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .ts-cap{font-size:12px;color:var(--ink-soft);margin-top:2px;}

  .day-pills span{flex:1;height:25px;border-radius:8px;background:var(--cream-2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-soft);}
  .day-pills span.on{background:#7fa653;color:#fff;}
  .wseg{display:flex;gap:4px;margin-top:auto;}
  .wseg i{flex:1;height:9px;border-radius:3px;background:var(--cream-2);}
  .wseg i.on{background:#6FB8E0;}
  .ts-moods{display:flex;gap:7px;margin-top:auto;}
  .ts-moods span{font-size:21px;filter:grayscale(.5);opacity:.55;}
  .ts-moods span.on{filter:none;opacity:1;}
  .ts-sec{display:flex;justify-content:space-between;align-items:center;margin:22px 2px 12px;}
  .ts-sec b{font-size:16px;font-weight:800;}
  .ts-sec span{font-size:12px;color:var(--ink-soft);}

  .ts-feat-emoji{font-size:50px;}

  .ts-feat-stats div b{font-size:18px;font-weight:800;}
  .ts-feat-stats div span{font-size:11px;color:#5a6a48;display:block;}
  .ts-mini{display:flex;align-items:center;gap:14px;border-radius:20px;padding:16px;margin-top:12px;background:linear-gradient(135deg,#e4ecf7,#d4e0f2);}

  .mi-meta b{font-size:21px;font-weight:800;}
  .mi-meta .mi-l{font-size:12px;color:var(--ink-soft);}

  /* Topic 空间底部：添加更多卡片入口 */
  .ts-add-more{display:flex;align-items:center;gap:14px;width:100%;margin-top:18px;padding:16px 18px;

    font-family:var(--font);text-align:left;transition:background .15s;}
  .ts-add-more:active{background:rgba(139,92,246,.05);}

  .tool-emo{font-size:30px;flex:0 0 36px;}

  .tool-tag{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;}
  .tool-title{font-size:15px;font-weight:800;margin-top:3px;}
  .tool-info p{font-size:11.5px;color:var(--ink-soft);margin:3px 0 0;line-height:1.45;}

/* ============================ 导航 ============================ */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const r=document.getElementById('remote'); if(r) r.style.display=(id==='swipe')?'flex':'none';
  if(id==='home') renderHome();
}

/* ============================ Swipe Stack ============================ */
function startSwipe(){
  // 每次进入：拿当前方案；如果没有 pending 方案，自动切下一套
  if(!S.currentSet){
    S.currentSet = pickNextSet();
  }
  go('swipe');
  renderSplash();
}
// 选下一套：新用户首次给 WELCOME，否则按 setCursor 顺序
function pickNextSet(){
  if(S.isNewUser && !S.welcomedShown){
    S.welcomedShown=true;
    return JSON.parse(JSON.stringify(WELCOME_SET));
  }
  return JSON.parse(JSON.stringify(PUSH_SETS[S.setCursor % PUSH_SETS.length]));
}
function renderSplash(){
  const set=S.currentSet; if(!set){go('home');renderHome();return;}
  set.cards.forEach(c=>{ if(c.joined===undefined)c.joined=true; }); // 默认全部 ✓加入
  document.querySelector('.splash-hero').innerHTML=`
    <div class="splash-tag-row">
      <span class="sp-hero-tag">${set.tag}</span>
      <span class="sp-hero-cnt">${set.cards.length} 张</span>
    </div>
    <h2 class="splash-title">${set.e} ${set.title}</h2>
    <p class="splash-sub">${set.intro}</p>`;
  const deck=document.getElementById('splashDeck');
  deck.innerHTML=set.cards.map((c,i)=>`
    <div class="sp-card ${c.joined?'':'skipped'}" data-idx="${i}" onclick="openSetCardDetail(${i})">
      <button class="sp-toggle" onclick="event.stopPropagation();toggleSetCard(${i})">${c.joined?'✓':'✕'}</button>
      <div class="sp-tag">${c.tag}</div>
      <div class="sp-emo">${c.e}</div>
      <div class="sp-title">${c.title}</div>
      <div class="sp-body">${c.body}</div>
      <div class="sp-foot-hint">点看详情</div>
    </div>`).join('');
  renderSplashFoot();
}
function renderSplashFoot(){
  const set=S.currentSet; if(!set)return;
  const n=set.cards.filter(c=>c.joined).length;
  document.querySelector('.splash-foot').innerHTML = n===0
    ? `<button class="sp-skip" style="flex:1" onclick="commitSplash(true)">全部跳过 · 明天再说</button>`
    : `<button class="sp-skip" onclick="commitSplash(true)">跳过本次</button>
       <button class="sp-go" onclick="commitSplash(false)">加入 ${n} 张 →</button>`;
}
function toggleSetCard(i){
  const set=S.currentSet; if(!set)return;
  const c=set.cards[i]; c.joined=!c.joined;
  const el=document.querySelector(`.sp-card[data-idx="${i}"]`);
  if(el){ el.classList.toggle('skipped',!c.joined);
    el.querySelector('.sp-toggle').textContent=c.joined?'✓':'✕'; }
  renderSplashFoot();
}
function openSetCardDetail(idx){
  const set=S.currentSet; if(!set)return;
  openDetail(set.cards[idx], false);
}
function commitSplash(skipAll){
  const set=S.currentSet; if(!set){go('home');renderHome();return;}
  const joined = skipAll ? [] : set.cards.filter(c=>c.joined);
  const skipped = set.cards.filter(c=>!joined.includes(c));
  // 记录今日推送（不论收没收，都算一次推送）
  S.todayPushed++;
  S.todaySkipped = (S.todaySkipped||[]).concat(skipped.map(c=>({title:c.title,tag:c.tag,e:c.e})));
  if(joined.length===0){
    showFeedback(`已跳过 · 下次给你换一套`);
  } else {
    joined.forEach(c=>{
      c.status='in_topic'; c._setId=set.id; c._setTitle=set.title;
      c._day=S.day; c._viewed=false;          // 当日戳 + 翻看标记（给总结用）
      if(!S.topics[c.tag])S.topics[c.tag]=[];
      if(!S.topics[c.tag].includes(c))S.topics[c.tag].unshift(c);
    });
    S.isNewUser=false; // 第一次收下 → 不再是新用户
    showFeedback(`✓ 已加入 ${joined.length} 张${skipped.length?` · 跳过 ${skipped.length} 张`:''}`);
  }
  S.currentSet=null;
  S.setCursor++;
  go('home'); renderHome();
}

function attachDrag(el,card){
  let sx,sy,dx=0,dy=0,startT,dragging=false;
  const threshX=300*0.30;
  const overlay=el.querySelector('.drag-overlay');
  const btnSave=document.querySelector('.act-save'), btnDo=document.querySelector('.act-do');
  const nextEl=[...el.parentNode.children].find(x=>x.dataset&&x.dataset.depth==='1');
  const setNext=p=>{ if(!nextEl)return; nextEl.style.transition='none';
    nextEl.style.transform=`translateY(${-18+18*p}px) scale(${0.95+0.05*p})`; };
  const resetNext=()=>{ if(!nextEl)return; nextEl.style.transition='transform .3s cubic-bezier(.2,.8,.2,1)';
    nextEl.style.transform='translateY(-18px) scale(0.95)'; };
  const clearOverlay=()=>{ overlay.classList.remove('save','do'); overlay.style.opacity=1;
    if(btnSave)btnSave.classList.remove('lit'); if(btnDo)btnDo.classList.remove('lit'); };

  const down=e=>{
    if(el.querySelector('.flipper').classList.contains('flipped'))return;
    dragging=true;sx=e.clientX;sy=e.clientY;startT=Date.now();el.setPointerCapture(e.pointerId);el.style.transition='none';};
  const move=e=>{
    if(!dragging)return;
    dx=e.clientX-sx;dy=e.clientY-sy;
    const rot=Math.max(-15,Math.min(15,dx*0.07));
    el.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
    el.style.boxShadow='0 28px 60px rgba(100,60,140,.32)';
    overlay.classList.remove('save','do');
    if(btnSave)btnSave.classList.remove('lit'); if(btnDo)btnDo.classList.remove('lit');
    // 仅对水平拖动给反馈
    if(Math.abs(dx)>Math.abs(dy)*0.6 && Math.abs(dx)>8){
      const p=Math.min(1,Math.abs(dx)/threshX);
      overlay.style.opacity=Math.min(1,0.25+p*0.95);
      if(dx<0){ overlay.classList.add('save'); if(btnSave)btnSave.classList.add('lit'); }
      else{ overlay.classList.add('do'); if(btnDo)btnDo.classList.add('lit'); }
      setNext(p);
    }else{
      overlay.style.opacity=1;
      setNext(0);
    }
  };
  const up=e=>{
    if(!dragging)return;dragging=false;
    const dt=Date.now()-startT;const vx=Math.abs(dx)/dt;
    if(Math.abs(dx)<10 && Math.abs(dy)<10 && dt<300){
      el.style.transition='';el.style.transform='';el.style.boxShadow='';clearOverlay();resetNext();
      el.querySelector('.flipper').classList.add('flipped');return;
    }
    const fast=vx>0.6;
    el.style.transition='transform .42s cubic-bezier(.4,0,.2,1),opacity .42s';
    if(dx<-threshX || (fast&&dx<-30)){return fly(el,'left',card);}
    if(dx>threshX || (fast&&dx>30)){return fly(el,'right',card);}
    el.style.transform='';el.style.boxShadow='';clearOverlay();resetNext();
  };
  el.addEventListener('pointerdown',down);
  el.addEventListener('pointermove',move);
  el.addEventListener('pointerup',up);
  el.addEventListener('pointercancel',up);
}

function fly(el,dir,card){
  if(navigator.vibrate)navigator.vibrate(14);
  el.style.transition='transform .55s cubic-bezier(.32,.04,.18,1),opacity .55s';
  // 飞出加剧旋转 + 惯性
  const dest={
    left:'translate(-720px,80px) rotate(-42deg)',
    right:'translate(720px,80px) rotate(42deg)',
    trash:'translate(0,520px) scale(.72) rotate(8deg)'
  }[dir];
  el.style.transform=dest;el.style.opacity=0;
  // 后面的卡升位补上
  [...el.parentNode.querySelectorAll('.swcard')].filter(x=>x!==el).forEach(o=>{
    const nd=Math.max(0,(+o.dataset.depth)-1);
    o.style.transition='transform .42s cubic-bezier(.2,.8,.2,1)';
    o.style.transform=`translateY(${[0,-18,-36][nd]}px) scale(${[1,0.95,0.90][nd]})`;
    o.style.zIndex=10-nd;o.dataset.depth=nd;
  });
  // 语义（A 方案）：左=Save Topic，右=Do Today，trash=Delete
  if(dir==='trash'){
    card.status='deleted';
    showFeedback(`✓ 收到！Macaron 已记录你的偏好`);
    if(S.leftStreak.tag===card.type)S.leftStreak.n++;else S.leftStreak={tag:card.type,n:1};
    if(S.leftStreak.n>=3 && !S.nudgeShownToday){ setTimeout(()=>showNudge(card.type),200);}
  }else{
    S.leftStreak={tag:null,n:0};
    if(dir==='left'){ card.status='in_topic'; pushTopic(card,false); showSaveToast(card); }
    if(dir==='right'){ card.status='in_focus'; S.todayFocus.push(card); }
  }
  setTimeout(()=>{ S.swipeIndex++;
    if(S.swipeIndex>=10){ achievement(); }
    else renderStack();
  },500);
}

    row.appendChild(c);
  } else {
    liveTags.forEach(tag=>{
      const meta=Object.values(TOPIC_META).find(m=>m[1]===tag)||['📂',tag,''];
      const isFlash=S.flashTopic===tag;
      const c=document.createElement('div');c.className='top-circle'+(isFlash?' flash':'');c.onclick=()=>openTopic(tag);
      c.innerHTML=`<div class="tc-ball">${meta[0]}</div><span class="tc-name">${tag}</span>`;
      row.appendChild(c);
      if(isFlash){
        setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),100);
      }
    });
  }

  // 今日推送 / 空状态文案
  const groups=document.getElementById('homeGroups');groups.innerHTML='';
  if(!hasContent){
    groups.innerHTML=`
      <div class="newuser-hero">
        <div class="nu-emo">🍪</div>
        <h3>刚认识，慢慢来。</h3>
        <p>跟 Macaron 聊点什么 —— 等你聊过的东西多了，这里会自然长出你的话题空间。</p>
        <div class="nu-hint">从演示控制 → "🌅 进入新的一天" 可以看一份开屏方案。</div>
      </div>`;
    return;
  }
  const tagsWithContent=liveTags;
  tagsWithContent.forEach(tag=>{
    const cards=S.topics[tag];
    if(cards.length===0)return;
    const todayN=cards.filter(c=>c._day===S.day).length;
    const cntLabel = todayN>0
      ? `今日 ${todayN} 张${cards.length>todayN?` · 共 ${cards.length}`:''}`
      : `共 ${cards.length} 张`;
    const sec=document.createElement('div');sec.className='group-sec';
    sec.innerHTML=`<div class="group-head"><h4>${tag} <small>· ${cntLabel}</small></h4>
      <span class="more" onclick="openTopic('${tag}')">看全部 →</span></div>
      <div class="group-row" id="grp-${tag.replace('#','')}"></div>`;
    groups.appendChild(sec);
    const gr=document.getElementById('grp-'+tag.replace('#',''));
    cards.forEach((c,i)=>{
      const el=document.createElement('div');el.className='mini-card';
      el.onclick=()=>{ if(!el._lpFired) openDetail(c,false); el._lpFired=false; };
      attachLongPress(el, ()=>askDeleteCard(c, el));
      const srcBadge = c._source==='chat' ? `<span class="mc-src">💬 聊出来的</span>` : '';
      const editBadge = c._edited ? `<span class="mc-src" style="background:rgba(120,90,160,.13);color:#7a64a0">✏️ 已编辑</span>` : '';
      el.innerHTML=`<div class="mc-tag">${c.tag}</div>${srcBadge||editBadge}
        <div class="mc-widget">${miniWidget(c)}</div>
        <div class="mc-title">${c.title}</div>
        <div class="mc-body">${c.body}</div>`;
      gr.appendChild(el);
    });
  });
}

function statCard(s){
  let bottom='';
  if(s.prog)bottom=`<div class="ts-prog"><i style="width:${s.prog[0]};background:${s.prog[1]}"></i></div>`;

  const corner = s.pill?`<span class="ts-pill" style="background:${s.pill[1]};color:${s.pill[2]}">${s.pill[0]}</span>`
    : s.corner?`<span style="font-size:16px;color:var(--ink-soft)">${s.corner}</span>`:'';
  return `<div class="ts-stat"><div class="ts-row"><div class="ts-ico" style="background:${s.bg}">${s.ic}</div>${corner}</div>
    <div class="ts-big">${s.big}</div><div class="ts-cap">${s.cap}</div>${bottom}</div>`;
}

function chatSend(preset){
  const inp=document.getElementById('chatInput');
  const txt=preset||(inp&&inp.value.trim());
  if(!txt)return;
  if(inp)inp.value='';
  const body=document.getElementById('chatBody');
  // 用户气泡
  const userBub=document.createElement('div');
  userBub.className='cm user';
  userBub.innerHTML=`<div class="cm-av"></div><div class="cm-bub">${txt}</div>`;
  body.appendChild(userBub);
  body.scrollTop=body.scrollHeight;

  // === 给 Topic 添加卡：优先 ===
  if(addingToTopic && !addPending){
    setTimeout(()=>{
      addAIMsg('好的，我按你说的整理一张，看看？');
      setTimeout(()=>{
        const cardData=generateCardFromInput(addingToTopic, txt);
        showAddPreview(cardData);
      },700);
    },500);
    return;
  }

  // === 编辑模式优先 ===
  if(editingCard && !editPending){
    setTimeout(()=>{
      addAIMsg('好的，我按你说的改一版，看看？');
      setTimeout(()=>{
        const diff=tryParseEdit(txt);
        showEditPreview(diff);
      },700);
    },500);
    return;
  }

  // === 删除意图识别 ===
  const deleteHit=tryParseDelete(txt);
  if(deleteHit){
    setTimeout(()=>{
      addAIMsg(`你是说删掉这张？`);
      setTimeout(()=>showDeleteConfirm(deleteHit),500);
    },500);
    return;
  }

  // === 卡片生成剧本 ===
  const script=findScript(txt);
  if(script && !pendingChatCard){
    runScript(script);
  } else {
    setTimeout(()=>{
      const replies=[
        '嗯，我听到了。',
        '收到。说出来心里就轻一点。',
        '我帮你记下了。',
        '想多聊聊还是先放着？',
        '试着说说看，怎么开始的？'
      ];
      addAIMsg(replies[Math.floor(Math.random()*replies.length)]);
    },600);
  }
}

// 删除意图识别：抓"删/不要/取消/移除" + 标题模糊匹配
function tryParseDelete(txt){
  const isDelete = /(删[除掉了]?|不要那|取消那|移除|删了|丢[掉了])/.test(txt);
  if(!isDelete) return null;
  // 在所有 topics 卡片里模糊匹配
  const all=[];
  Object.values(S.topics).forEach(arr=>arr.forEach(c=>all.push(c)));
  if(all.length===0) return null;
  // 简单：标题某 2 字命中即视为匹配
  let best=null, bestScore=0;
  all.forEach(c=>{
    const title=c.title||'';
    let s=0;
    for(let i=0;i<title.length-1;i++){
      const g=title.substring(i,i+2);
      if(txt.includes(g)) s++;
    }
    if(s>bestScore){bestScore=s;best=c;}
  });
  return bestScore>=1 ? best : all[0]; // 至少匹配 2 字；否则给最近一张
}

/* ============ 长按删除（卡片上点确认） ============ */
function attachLongPress(el, callback){
  let timer=null, fired=false;
  const start=(e)=>{
    fired=false; el._lpFired=false;
    timer=setTimeout(()=>{
      fired=true; el._lpFired=true;
      if(navigator.vibrate)navigator.vibrate(30);
      callback();
    },500);
  };
  const cancel=()=>{ if(timer){clearTimeout(timer);timer=null;} };
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchcancel',cancel);
  el.addEventListener('touchmove',cancel);
}

function askDeleteCard(card, anchorEl){
  // 移除之前的浮层
  document.querySelectorAll('.del-confirm').forEach(e=>e.remove());
  const rect = anchorEl.getBoundingClientRect();
  const phone = document.querySelector('.phone');
  const phoneRect = phone.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='del-confirm';
  pop.innerHTML=`<div class="dc-text">🗑 删除这张？</div>
    <div class="dc-acts"><button class="dc-cancel">取消</button>
    <button class="dc-yes">删除</button></div>`;
  // 定位到卡片正中
  pop.style.cssText=`top:${rect.top - phoneRect.top + 14}px;left:${rect.left - phoneRect.left + rect.width/2}px;transform:translateX(-50%);`;
  phone.appendChild(pop);
  // 点 anchorEl 之外关闭
  const outside=(e)=>{ if(!pop.contains(e.target)){pop.remove();document.removeEventListener('click',outside,true);} };
  setTimeout(()=>document.addEventListener('click',outside,true),50);
  pop.querySelector('.dc-cancel').onclick=(e)=>{e.stopPropagation();pop.remove();};
  pop.querySelector('.dc-yes').onclick=(e)=>{
    e.stopPropagation();

function acceptChatCard(){
  if(!pendingChatCard)return;
  const {script}=pendingChatCard;
  const cardData={...script.card, id:'chat'+Date.now(), status:'in_topic', _source:'chat'};
  S.isNewUser=false; // 产生过对话沉淀 → 不再是新用户
  // 新 Topic 解锁
  if(script.isNewTopic){
    const meta=script.newTopicMeta;
    const tag=meta[1];
    if(!S.topics[tag]){
      S.topics[tag]=[];
      // 注册到 TOPIC_META
      TOPIC_META[tag.replace('#','').toLowerCase()]=meta;
      // 也在 CANDY_SHAPES 加个默认形状（备用）
      if(!CANDY_SHAPES[tag]){CANDY_SHAPES[tag]=CANDY_SHAPES.__default;}
      S.flashTopic=tag; // 让金刚位短暂闪光
    }
    S.topics[tag].unshift(cardData);
    showFeedback(`✨ 已创建 <b>${tag}</b> · 加入第一张卡`);
  } else {
    if(!S.topics[cardData.tag])S.topics[cardData.tag]=[];
    S.topics[cardData.tag].unshift(cardData);
    showFeedback(`✓ 已加到 <b>${cardData.tag}</b>`);
  }
  // 预览变成"已加入"状态
  const wrap=document.getElementById('chatCardPreview');
  if(wrap){
    wrap.classList.add('done');
    wrap.querySelector('.cm-card-acts').innerHTML=`<span class="cm-done">✓ 已加入 ${cardData.tag}</span>`;
  }
  pendingChatCard=null;
  // Macaron 回复确认
  setTimeout(()=>{
    addAIMsg(script.isNewTopic?'建好了。下次聊到我会往这里放。':'加好了。下次想起来翻这张就行。');
  },500);
  // 同步主页（不关聊天）
  renderHome();
  // 金刚位闪光稍后清
  if(script.isNewTopic) setTimeout(()=>{S.flashTopic=null;renderHome();},2200);
}

// 简易解析用户的"改"意图，给出新版预览
function tryParseEdit(txt){
  let newTitle=null, newBody=null;
  // 标题改成 X / 改名为 X / title 改成 X
  let m = txt.match(/标题\s*改成?[：:\s]*([^，。\s]+)/) || txt.match(/改名为[：:\s]*([^，。\s]+)/);
  if(m) newTitle=m[1];
  // 时长改成 X 分钟
  m = txt.match(/(\d+)\s*分钟/) || txt.match(/时长.*?(\d+)/);
  if(m){
    const mins=m[1];
    newBody=(editingCard.body||'').replace(/\d+\s*分钟/g, mins+' 分钟');
    if(newBody===editingCard.body) newBody = `${mins} 分钟 · ${editingCard.body}`;
  }
  // 描述/内容改成 X
  m = txt.match(/(?:描述|内容|说明)\s*改成?[：:\s]*(.+)/);
  if(m) newBody=m[1].trim();
  // 通用 fallback：用户给了任意指示 → 在 body 后追加 "（已根据你的意见调整）"
  if(!newTitle && !newBody){
    newTitle = editingCard.title;
    newBody = editingCard.body + '（已按你的意思调整）';
  }
  return {newTitle: newTitle||editingCard.title, newBody: newBody||editingCard.body};
}

    const mi=cfg.mini;
    html+=`<div class="ts-mini"><div class="mi-ico">${mi.ic}</div>
        <div class="mi-meta"><b>${mi.big}</b><div class="mi-l">${mi.l}</div><div class="mi-s">${mi.s}</div></div>${tag==='#Fitness'?spark():''}</div>`;
  }
  if(!cfg && cards.length===0 && userTools.length===0){
    html+=`<div class="focus-empty">这里还很空，右滑卡片就会以工具的形式收进来 ✦</div>`;
  }

  // 末尾：添加更多卡片入口
  html+=`<button class="ts-add-more" onclick="startAddToTopic('${tag}')">
    <span class="tam-ic">＋</span>
    <span class="tam-txt">添加更多卡片<small>跟 Macaron 聊聊，给这个空间加点东西</small></span>
    <span class="tam-arrow">→</span>
  </button>`;

  document.getElementById('topicSpace').innerHTML=html;
  go('topic');
  // 给用户的工具卡（cards 部分）加长按删除
  const orderedCards = cards.slice();
  document.querySelectorAll('#topicSpace .ts-tool.user').forEach((el,i)=>{
    const c=orderedCards[i];
    if(!c)return;  // 跳过 userTools / macaron 预置（没有对应 card 对象）
    // 阻止长按后立刻触发 click
    const origClick=el.getAttribute('onclick');
    el.removeAttribute('onclick');
    el.onclick=()=>{ if(!el._lpFired) openDetail(c,false); el._lpFired=false; };
    attachLongPress(el, ()=>askDeleteCard(c, el));
  });
}

/* ============================ Daily Summary（到点必弹） ============================ */
function openSummary(){
  const sheet=document.getElementById('summarySheet');
  // ✅ 统计源：S.topics（真实入库的卡），按当日 _day 过滤 —— 不再依赖旧 swipe 牌堆 S.cards
  const todayCards=[];
  Object.values(S.topics).forEach(arr=>arr.forEach(c=>{ if(c._day===S.day) todayCards.push(c); }));
  const viewed=todayCards.filter(c=>c._viewed);
  const unviewed=todayCards.filter(c=>!c._viewed);
  const tagCount={};
  todayCards.forEach(c=>{tagCount[c.tag]=(tagCount[c.tag]||0)+1;});
  const topTag=Object.entries(tagCount).sort((a,b)=>b[1]-a[1])[0];

  const stats=`<div class="sum-stats">
      <div class="stt"><b style="color:#9fe3b0">${todayCards.length}</b><span>今日加入</span></div>
      <div class="stt"><b style="color:#c8b6ff">${Object.keys(tagCount).length}</b><span>涉及话题</span></div>
      <div class="stt"><b style="color:rgba(255,255,255,.55)">${S.todayPushed||0}</b><span>今日推送</span></div>
    </div>`;
  const topLine = topTag ? `<div class="sum-line">今天 <b>${topTag[0]}</b> 收得最多 · ${topTag[1]} 张</div>`:'';
  const cardRow=c=>`<div class="sum-card">
        <div class="row1"><span class="e">${c.e}</span><b>${c.title}</b><span class="defer">${c.tag}</span></div></div>`;

  let body;
  if(todayCards.length===0){
    // 形态一：今天全部跳过 / 没收新内容 → 回顾 + 简短观察
    const skippedN=(S.todaySkipped||[]).length;
    body=`<div class="sum-head">
        <div class="sum-emo">🌙</div>
        <h2>今日回顾</h2>
        <p class="sub">${skippedN?`今天的 ${skippedN} 张都跳过了 —— 没关系，明天换一套口味。`:'今天没收下新方案，明天再来。'}</p></div>
      ${stats}
      <button class="sum-close" onclick="closeSummary()">明天见</button>`;
  } else if(unviewed.length===0){
    // 形态二：全部翻看 → 庆祝 + 完成清单
    body=`<div class="sum-head">
        <div class="sum-emo">🎉</div>
        <h2>今天全部看完了！</h2>
        <p class="sub">收下的 ${todayCards.length} 张都翻过了，给你记一笔。</p></div>
      ${stats}${topLine}
      <div class="sum-section">今天看过的内容</div>
      ${viewed.slice(0,5).map(cardRow).join('')}
      <button class="sum-close primary" onclick="closeSummary()">晚安 ✦</button>`;
  } else {
    // 形态三：部分未看 → 列出未看的 + Topic 分布观察
    body=`<div class="sum-head">
        <div class="sum-emo">🌙</div>
        <h2>今日总结</h2>
        <p class="sub">收下了 ${todayCards.length} 张，还有 ${unviewed.length} 张没翻开。</p></div>
      ${stats}${topLine}
      <div class="sum-section">还没看的内容 · 都收在话题空间里</div>
      ${unviewed.slice(0,5).map(cardRow).join('')}
      <button class="sum-close primary" onclick="closeSummary()">好</button>`;
  }
  sheet.innerHTML=`<div class="sheet-grip"></div>${body}`;
  document.getElementById('summary-veil').classList.add('on');
}
function closeSummary(){document.getElementById('summary-veil').classList.remove('on');renderHome();}

/* ============================ 演示控制 ============================ */
function newDay(){
  S.day++;                 // 进入新的一天：天数戳 +1（"今日"统计随之翻篇）
  S.todayPushed=0;
  S.todaySkipped=[];
  S.currentSet=null; // 强制重新取
  document.getElementById('devMenu').classList.remove('on');
  startSwipe();
}
function resetAll(){ MODE_STATES={}; activeMode=null; init(); document.getElementById('devMenu').classList.remove('on'); setModeBadge(null); }
function setModeBadge(label,color){
  const b=document.getElementById('modeBadge'); if(!b)return;
  if(!label){b.style.display='none';return;}
  b.textContent='演示中：'+label;
  b.style.display='block'; b.style.background=color; b.style.color='#fff';
}
function blankTopics(st){
  ['#Fitness','#Recipe','#Mood','#Study','#Music','#Style','#Local','#Travel','#Meditation','#Money'].forEach(t=>st.topics[t]=[]);
  return st;
}
// 构造「新用户」初始沙盒：空话题 + 通用欢迎方案
function buildNewUserState(){
  const st=blankTopics(freshState());
  st.isNewUser=true; st.welcomedShown=true;
  st.currentSet=JSON.parse(JSON.stringify(WELCOME_SET));
  st.currentSet.cards.forEach((c,i)=>{c.id='w'+i;c.status='pending';});
  return st;
}
// 构造「老用户」初始沙盒：预置几天历史 + 个性化推送
function buildExistingUserState(){
  const st=blankTopics(freshState());
  st.isNewUser=false; st.welcomedShown=true;
  st.day=3; st.setCursor=4; st.todayPushed=1;
  const seed=(setIdx,cardIdx,day,viewed,completed)=>{
    const src=PUSH_SETS[setIdx].cards[cardIdx];
    const c={...src, id:'seed'+setIdx+'_'+cardIdx, status:'in_topic', _day:day, _viewed:viewed, completed:completed};
    if(!st.topics[c.tag])st.topics[c.tag]=[];
    st.topics[c.tag].unshift(c);
  };
  seed(0,0,1,true,true); seed(0,1,1,true,false); seed(0,2,2,true,true);
  seed(1,0,2,true,false); seed(4,0,2,false,false); seed(3,1,1,true,false);
  seed(0,3,3,false,false); seed(1,1,3,true,false);
  st.currentSet=JSON.parse(JSON.stringify(PUSH_SETS[3]));
  st.currentSet.cards.forEach((c,i)=>{c.id='reg'+i;c.status='pending';});
  return st;
}
// 双沙盒：两个模式各自独立持久，切换只是换沙盒，互不相加、互不污染
let MODE_STATES={};   // mode -> 独立的 S 快照
let activeMode=null;
function switchMode(mode){
  document.getElementById('devMenu').classList.remove('on');
  if(activeMode) MODE_STATES[activeMode]=S;          // 离开前存档当前沙盒
  const firstTime=!MODE_STATES[mode];
  if(firstTime) MODE_STATES[mode]= mode==='new'?buildNewUserState():buildExistingUserState();
  S=MODE_STATES[mode]; activeMode=mode;               // 切到目标沙盒
  setModeBadge(mode==='new'?'新用户 · 缺省首日':'老用户 · 常规日', mode==='new'?'#5e8c4e':'#8B5CF6');
  const hasContent=Object.values(S.topics).some(a=>a.length>0);
  if(firstTime || (S.currentSet && !hasContent)){
    go('swipe'); renderSplash();
    showFeedback(mode==='new'
      ? '👶 新用户首日 · 通用欢迎方案。跳过看空主页，或收下看首批内容'
      : '🔁 老用户常规日 · 个性化推送。收下后主页已有话题空间');
  } else {
    go('home'); renderHome();
    showFeedback('已切回'+(mode==='new'?'新用户':'老用户')+'沙盒 · 保留了你上次的选择');
  }
}
function enterNewUser(){ switchMode('new'); }
function enterExistingUser(){ switchMode('existing'); }
function resetToNewUser(){ enterNewUser(); }
function demoChat(which){
  document.getElementById('devMenu').classList.remove('on');
  // 确保在主页
  if(!document.getElementById('home').classList.contains('active')) go('home');
  openMacaronChat();
  // 自动模拟用户输入
  setTimeout(()=>{
    let txt;
    if(which==='pet') txt='想养一只猫';
    else if(which==='delete') txt='删掉那张喝水提醒';
    else txt='最近老是失眠';
    chatSend(txt);
  }, 600);
}

function tick(){const n=new Date();document.getElementById('clock').textContent=
  String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
setInterval(tick,1000);tick();

/* ============================ 键盘快捷（外部操作） ============================ */
document.addEventListener('keydown',e=>{
  if(document.getElementById('detail-veil').classList.contains('on')) return;
  if(document.getElementById('summary-veil').classList.contains('on')) return;
  if(!document.getElementById('swipe').classList.contains('active')) return;
  if(e.key==='Escape'){
    if(document.getElementById('detail-veil').classList.contains('on'))closeDetail();
    else if(document.getElementById('chatVeil').classList.contains('on'))closeChat();
    else if(document.getElementById('summary-veil').classList.contains('on'))closeSummary();
  }
});

let tourIdx=0, tourFocusEl=null, tourFocusTimer=null;
function startTour(){
  document.getElementById('devMenu').classList.remove('on');
  setModeBadge(null);
  const bs=document.getElementById('bigStart'); if(bs)bs.style.display='none';
  tourIdx=0;
  document.body.classList.add('in-tour');
  document.getElementById('tourVeil').classList.add('on');
  showFeedback(window.innerWidth > 980 ? '✓ 导览已开启 · 看右侧讲解' : '✓ 导览已开启 · 看下方讲解');
  resetAll();
  // 导览用 Fitness 为主的演示方案，展示更丰富的 Dynamic UI
  S.currentSet = JSON.parse(JSON.stringify(TOUR_SET));
  S.currentSet.cards.forEach((c,i)=>{ c.id='tour'+i; c.status='pending'; });
  setTimeout(()=>{
    if(document.getElementById('swipe').classList.contains('active')) renderSplash();
    showTourStep();
  },250);
}
function endTour(){
  document.body.classList.remove('in-tour');
  document.getElementById('tourVeil').classList.remove('on');
  const bs=document.getElementById('bigStart'); if(bs)bs.style.display='';
  clearTourFocus();
}
function clearTourFocus(){
  if(tourFocusTimer){clearTimeout(tourFocusTimer);tourFocusTimer=null;}
  if(tourFocusEl){
    [...tourFocusEl].forEach(e=>e.classList.remove('tour-focus'));
    tourFocusEl=null;
  }
}
function applyTourFocus(sel){
  clearTourFocus();
  if(!sel)return;
  const els=document.querySelectorAll(sel);
  if(els.length===0)return;
  els.forEach(e=>e.classList.add('tour-focus'));
  tourFocusEl=els;
  // 3 秒后自动停止脉冲，避免长时间占用注意力 & 挡操作
  tourFocusTimer=setTimeout(()=>{
    if(tourFocusEl===els){
      [...els].forEach(e=>e.classList.remove('tour-focus'));
      tourFocusEl=null;
    }
    tourFocusTimer=null;
  }, 3000);
}
function tourNeedHome(){ go('home'); }
function showTourStep(){
  const s=TOUR_STEPS[tourIdx]; if(!s)return endTour();
  // 切场景
  if(s.auto==='splash' || s.act===1){
    if(!document.getElementById('swipe').classList.contains('active')){go('swipe');renderSplash();}
  } else if(s.advance==='home' || s.act===2){
    // 自动提交 splash：把当前方案的卡加入对应 Topic（让主页有数据展示）
    if(S.currentSet){
      S.currentSet.cards.forEach(c=>{
        c.status='in_topic'; c._day=S.day; c._viewed=false;
        if(!S.topics[c.tag])S.topics[c.tag]=[];
        if(!S.topics[c.tag].includes(c))S.topics[c.tag].unshift(c);
      });
      S.currentSet=null; S.setCursor++; S.todayPushed++;
    }
    go('home'); renderHome();
  } else if(s.act===3){
    // 自动进一个 Topic 看 dashboard
    if(!document.getElementById('topic').classList.contains('active')){
      const firstTag=Object.keys(S.topics).find(t=>S.topics[t].length>0)||'#Fitness';
      openTopic(firstTag);
    }
  }
  if(s.auto==='summary'){
    if(!document.getElementById('summary-veil').classList.contains('on')) openSummary();
  }
  // 填充浮层内容
  document.getElementById('tourActNo').textContent=`第 ${s.act} 幕 · ${tourIdx+1} / ${TOUR_STEPS.length}`;
  document.getElementById('tourBar').style.width=((tourIdx+1)/TOUR_STEPS.length*100)+'%';
  document.getElementById('tourTitle').innerHTML=`<span class="tour-act-banner">${TOUR_ACTS[s.act]||''}</span><br>${s.title}`;
  document.getElementById('tourText').innerHTML=s.text;
  document.getElementById('tourPrev').disabled=(tourIdx===0);
  document.getElementById('tourNext').textContent= s.last ? '完成 ✓' : (tourIdx===TOUR_STEPS.length-1?'完成':'下一步 →');
  // 高亮
  setTimeout(()=>applyTourFocus(s.focus),300);
}
function tourNext(){
  const s=TOUR_STEPS[tourIdx];
  if(s.last){endTour();return;}
  tourIdx++; clearTourFocus();
  // 处理需要关闭浮层的情况：从 4.x 到下一幕（或结束），关掉 summary
  const next=TOUR_STEPS[tourIdx];
  if(!next || next.auto!=='summary'){
    if(document.getElementById('summary-veil').classList.contains('on'))closeSummary();
  }
  showTourStep();
}
function tourPrev(){
  if(tourIdx<=0)return;
  tourIdx--; clearTourFocus();
  const cur=TOUR_STEPS[tourIdx];
  if(cur.auto!=='summary' && document.getElementById('summary-veil').classList.contains('on'))closeSummary();
  showTourStep();
}

/* ============================ 启动 ============================ */
function init(){
  S=freshState();
  ['#Fitness','#Recipe','#Mood','#Study','#Music','#Style','#Local','#Travel','#Meditation','#Money'].forEach(t=>S.topics[t]=[]);
  const meAv=document.getElementById('meAv'); if(meAv)meAv.src=MACARON_AVATAR;
  const stAv=document.getElementById('stAv'); if(stAv)stAv.src=MACARON_AVATAR;
  startSwipe();
}
init();
</script>
